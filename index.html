<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Animated Blue Box | Pure Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0B132B, #030717);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ONLY BLUE BOX - No other elements */
    .blue-box {
      width: 280px;
      height: 280px;
      background: rgba(10, 25, 55, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(0, 210, 255, 0.9);
      box-shadow: 0 0 50px rgba(0, 225, 255, 0.5), 0 25px 45px rgba(0, 0, 0, 0.4);
      animation: boxPulse 2.6s infinite ease-in-out;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Pulsing animation for the blue box */
    @keyframes boxPulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), 0 0 10px rgba(0, 210, 255, 0.6);
        border-color: rgba(0, 210, 255, 0.8);
      }
      50% {
        transform: scale(1.08);
        box-shadow: 0 0 70px rgba(0, 225, 255, 0.8), 0 0 30px rgba(0, 210, 255, 0.9);
        border-color: #FFD966;
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), 0 0 10px rgba(0, 210, 255, 0.6);
        border-color: rgba(0, 210, 255, 0.8);
      }
    }

    /* Rotating ring around the box */
    .rotating-ring {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 70px;
      border: 2px solid rgba(0, 210, 255, 0.4);
      border-top: 3px solid rgba(255, 215, 0, 0.8);
      border-right: 2px solid rgba(0, 255, 255, 0.6);
      animation: spinRing 12s linear infinite;
      pointer-events: none;
    }

    @keyframes spinRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Inner rotating ring */
    .inner-ring {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50px;
      border: 1.5px dashed rgba(255, 215, 0, 0.5);
      animation: spinRingReverse 8s linear infinite;
      pointer-events: none;
    }

    @keyframes spinRingReverse {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    /* Center icon inside blue box */
    .blue-box i {
      font-size: 5rem;
      background: linear-gradient(135deg, #FFE6B0, #FFC107, #3ECFEF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.7));
      animation: iconFloat 2s infinite ease-in-out;
      z-index: 2;
    }

    @keyframes iconFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* Rotating small icons around the box */
    .orbiting-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .orbit-icon {
      position: absolute;
      width: 45px;
      height: 45px;
      background: rgba(0, 20, 50, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #FFE29A;
      border: 1px solid rgba(0, 210, 255, 0.6);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
      animation: orbitPulse 3s infinite alternate;
    }

    .orbit-icon:nth-child(1) {
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 0s;
    }
    .orbit-icon:nth-child(2) {
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 0.3s;
    }
    .orbit-icon:nth-child(3) {
      left: -25px;
      top: 50%;
      transform: translateY(-50%);
      animation-delay: 0.6s;
    }
    .orbit-icon:nth-child(4) {
      right: -25px;
      top: 50%;
      transform: translateY(-50%);
      animation-delay: 0.9s;
    }

    @keyframes orbitPulse {
      0% {
        transform: translateX(-50%) scale(1);
        box-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
      }
      100% {
        transform: translateX(-50%) scale(1.2);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      }
    }

    /* Fix for top/bottom icons transform */
    .orbit-icon:nth-child(1) {
      transform: translateX(-50%);
    }
    .orbit-icon:nth-child(2) {
      transform: translateX(-50%);
    }
    @keyframes orbitPulseTop {
      0% { transform: translateX(-50%) scale(1); }
      100% { transform: translateX(-50%) scale(1.2); }
    }
    @keyframes orbitPulseBottom {
      0% { transform: translateX(-50%) scale(1); }
      100% { transform: translateX(-50%) scale(1.2); }
    }
    @keyframes orbitPulseLeft {
      0% { transform: translateY(-50%) scale(1); }
      100% { transform: translateY(-50%) scale(1.2); }
    }
    @keyframes orbitPulseRight {
      0% { transform: translateY(-50%) scale(1); }
      100% { transform: translateY(-50%) scale(1.2); }
    }

    .orbit-icon:nth-child(1) { animation: orbitPulseTop 2.5s infinite alternate; }
    .orbit-icon:nth-child(2) { animation: orbitPulseBottom 2.5s infinite alternate 0.4s; }
    .orbit-icon:nth-child(3) { animation: orbitPulseLeft 2.5s infinite alternate 0.8s; }
    .orbit-icon:nth-child(4) { animation: orbitPulseRight 2.5s infinite alternate 1.2s; }

    /* Sparkle particles inside box */
    .sparkles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      border-radius: 60px;
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #FFD966, #FFA500);
      border-radius: 50%;
      opacity: 0;
      animation: sparkleFloat 3s infinite ease-in-out;
    }

    .sparkle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 60%; left: 75%; animation-delay: 0.5s; width: 8px; height: 8px; }
    .sparkle:nth-child(3) { top: 80%; left: 30%; animation-delay: 1s; }
    .sparkle:nth-child(4) { top: 30%; left: 80%; animation-delay: 1.5s; width: 5px; height: 5px; }
    .sparkle:nth-child(5) { top: 45%; left: 45%; animation-delay: 2s; width: 7px; height: 7px; }
    .sparkle:nth-child(6) { top: 70%; left: 20%; animation-delay: 2.5s; }
    .sparkle:nth-child(7) { top: 15%; left: 55%; animation-delay: 0.8s; width: 4px; height: 4px; }
    .sparkle:nth-child(8) { top: 85%; left: 65%; animation-delay: 1.8s; }

    @keyframes sparkleFloat {
      0% {
        opacity: 0;
        transform: translateY(0px) scale(0.5);
      }
      50% {
        opacity: 1;
        transform: translateY(-12px) scale(1.2);
        box-shadow: 0 0 12px gold;
      }
      100% {
        opacity: 0;
        transform: translateY(-24px) scale(0.5);
      }
    }

    /* Glowing background effect behind box */
    .glow-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 200, 255, 0.15), transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
      pointer-events: none;
      animation: ambientGlow 4s infinite alternate;
    }

    @keyframes ambientGlow {
      0% { opacity: 0.3; transform: scale(0.9); }
      100% { opacity: 0.7; transform: scale(1.1); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .blue-box {
        width: 220px;
        height: 220px;
        border-radius: 45px;
      }
      .blue-box i {
        font-size: 3.8rem;
      }
      .rotating-ring {
        width: 260px;
        height: 260px;
        border-radius: 55px;
      }
      .inner-ring {
        width: 180px;
        height: 180px;
        border-radius: 40px;
      }
      .orbit-icon {
        width: 38px;
        height: 38px;
        font-size: 1.1rem;
      }
      .orbit-icon:nth-child(1) { top: -20px; }
      .orbit-icon:nth-child(2) { bottom: -20px; }
      .orbit-icon:nth-child(3) { left: -20px; }
      .orbit-icon:nth-child(4) { right: -20px; }
      .glow-bg {
        width: 300px;
        height: 300px;
      }
    }

    /* Hover effect */
    .blue-box:hover {
      transform: scale(1.02);
      transition: transform 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  
  <div class="blue-box">
    <!-- Rotating rings -->
    <div class="rotating-ring"></div>
    <div class="inner-ring"></div>
    
    <!-- Orbiting small icons around the box -->
    <div class="orbiting-icons">
      <div class="orbit-icon"><i class="fas fa-star"></i></div>
      <div class="orbit-icon"><i class="fas fa-gem"></i></div>
      <div class="orbit-icon"><i class="fas fa-circle"></i></div>
      <div class="orbit-icon"><i class="fas fa-crown"></i></div>
    </div>
    
    <!-- Sparkle particles inside -->
    <div class="sparkles">
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>
    
    <!-- Center icon (NO TEXT, only icon) -->
    <i class="fas fa-cube"></i>
  </div>
</body>
</html>
