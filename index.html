<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Premium Hero | Tax & GST Consultants Coimbatore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      background: #0A1128;
    }

    /* Fullscreen Hero Section - Completely Arranged */
    .hero-premium {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0B132B, #030717);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
    }

    /* Animated Grid Lines Background */
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 215, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 215, 0, 0.04) 1px, transparent 1px);
      background-size: 55px 55px;
      pointer-events: none;
      z-index: 0;
      animation: slowGridMove 35s linear infinite;
    }

    @keyframes slowGridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(55px, 55px); }
    }

    /* Particle Canvas */
    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Main Content Center - FULLY ARRANGED */
    .content-center {
      position: relative;
      z-index: 15;
      text-align: center;
      max-width: 1300px;
      width: 92%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ORBIT WRAPPER - Central Area for Icons & Symbol */
    .orbit-zone {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 2.2rem;
      min-height: 340px;
      width: 100%;
    }

    /* Rotating Thin Circular Ring */
    .rotating-ring {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 215, 0, 0.45);
      border-top: 2px solid rgba(0, 255, 255, 0.75);
      border-right: 1.5px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 0 28px rgba(0, 255, 255, 0.25);
      animation: spinRing 22s linear infinite;
      pointer-events: none;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .rotating-ring::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #FFD966;
      border-radius: 50%;
      filter: blur(2px);
      box-shadow: 0 0 12px gold;
    }

    .rotating-ring::after {
      content: '';
      position: absolute;
      bottom: -8px;
      right: -8px;
      width: 14px;
      height: 14px;
      background: #00ffff;
      border-radius: 50%;
      filter: blur(3px);
      opacity: 0.9;
      box-shadow: 0 0 18px cyan;
    }

    @keyframes spinRing {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Floating Glowing Icons - Orbiting Effect */
    .icons-container {
      position: relative;
      width: 380px;
      height: 380px;
      margin: 0 auto;
    }

    .orbit-icon {
      position: absolute;
      width: 60px;
      height: 60px;
      background: rgba(12, 22, 45, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      color: #FFE29A;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35), 0 0 15px rgba(255, 215, 0, 0.5);
      border: 1px solid rgba(255, 215, 0, 0.55);
      animation: floatIcon 3.2s infinite ease-in-out;
      transition: all 0.2s;
      z-index: 5;
    }

    /* Perfect arrangement around the ring */
    .orbit-icon:nth-child(1) { top: 0%; left: 40%; animation-delay: 0s; }
    .orbit-icon:nth-child(2) { top: 70%; left: 5%; animation-delay: 0.4s; }
    .orbit-icon:nth-child(3) { top: 15%; right: 3%; animation-delay: 0.7s; }
    .orbit-icon:nth-child(4) { bottom: 2%; left: 48%; animation-delay: 1s; }
    .orbit-icon:nth-child(5) { top: 45%; left: -8%; animation-delay: 0.2s; }
    .orbit-icon:nth-child(6) { bottom: 22%; right: -4%; animation-delay: 0.9s; }

    @keyframes floatIcon {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-12px) scale(1.06); filter: drop-shadow(0 8px 18px rgba(0,210,255,0.3)); }
      100% { transform: translateY(0px) scale(1); }
    }

    /* CENTER SYMBOL - Auditor + Consultant (Replaces Name) */
    .center-symbol {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      background: rgba(8, 18, 35, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(255, 215, 0, 0.65);
      box-shadow: 0 0 35px rgba(0, 225, 255, 0.3), 0 15px 30px rgba(0,0,0,0.4);
      animation: centerPulseSymbol 3s infinite ease-in-out;
      z-index: 10;
    }

    .center-symbol i {
      font-size: 4rem;
      background: linear-gradient(135deg, #FFE6B0, #FFC107, #3ECFEF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 12px rgba(255,200,0,0.7));
    }

    .rotating-sub-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: spinSlow 16s linear infinite;
    }

    .rotating-sub-icons i {
      position: absolute;
      font-size: 2rem;
      opacity: 0.65;
      color: #C9F0FF;
    }

    .rotating-sub-icons i:first-child {
      top: -25px;
      left: 30px;
    }
    .rotating-sub-icons i:last-child {
      bottom: -22px;
      right: 28px;
    }

    @keyframes spinSlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes centerPulseSymbol {
      0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 25px rgba(0,255,210,0.2); }
      50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 45px rgba(255,215,0,0.4); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* GLASS TITLE CARD */
    .title-card {
      background: rgba(8, 18, 35, 0.6);
      backdrop-filter: blur(14px);
      border-radius: 80px;
      padding: 1.3rem 3rem;
      display: inline-block;
      margin-bottom: 1.6rem;
      border: 1px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.08);
    }

    .main-headline {
      font-size: clamp(2.2rem, 7vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(125deg, #FFFFFF, #FFECB3, #A9E5FF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1.2;
    }

    .service-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem 2rem;
      margin-top: 1rem;
    }

    .service-tags span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 170, 210, 0.18);
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #EFF7FF;
      backdrop-filter: blur(5px);
      letter-spacing: 0.2px;
      border: 0.5px solid rgba(255,215,0,0.3);
    }

    .service-tags i {
      color: #FFD966;
      font-size: 0.85rem;
    }

    /* Gradient Glow Pulse Behind */
    .glow-backdrop {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 220, 200, 0.2), rgba(255, 180, 0, 0) 70%);
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      animation: ambientGlow 5s infinite alternate;
      pointer-events: none;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
    }

    @keyframes ambientGlow {
      0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* CTA Buttons Premium */
    .cta-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.6rem;
      margin-top: 2rem;
    }

    .btn-consult {
      background: linear-gradient(105deg, #FFD966 0%, #E6B422 100%);
      border: none;
      padding: 1rem 2.6rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #0A1128;
      cursor: pointer;
      box-shadow: 0 12px 28px -10px rgba(0,0,0,0.45), 0 0 18px rgba(255, 217, 0, 0.5);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: inherit;
    }

    .btn-consult:hover {
      transform: translateY(-5px);
      box-shadow: 0 22px 35px -12px black, 0 0 28px #FFD966;
      background: linear-gradient(105deg, #FFE48A, #F5BC1A);
    }

    .btn-whatsapp {
      background: rgba(12, 25, 48, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 0, 0.8);
      padding: 1rem 2.6rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: #FFEFC0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn-whatsapp i {
      font-size: 1.3rem;
      color: #25D366;
    }

    .btn-whatsapp:hover {
      background: rgba(255, 215, 0, 0.18);
      border-color: #FFE69A;
      color: white;
      transform: translateY(-4px);
      box-shadow: 0 15px 28px -10px rgba(0,0,0,0.5);
    }

    /* Trust Badge */
    .trust-footer {
      margin-top: 2.2rem;
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: rgba(200, 225, 255, 0.6);
      letter-spacing: 0.3px;
      font-weight: 500;
    }

    .trust-footer i {
      margin-right: 5px;
      color: #FFD966;
    }

    /* Fade Stagger Animations */
    .fade-item {
      animation: fadeRise 0.75s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
      opacity: 0;
    }

    .fade-1 { animation-delay: 0.1s; }
    .fade-2 { animation-delay: 0.25s; }
    .fade-3 { animation-delay: 0.5s; }
    .fade-4 { animation-delay: 0.8s; }

    @keyframes fadeRise {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Mobile Fine-tuning */
    @media (max-width: 768px) {
      .icons-container {
        width: 280px;
        height: 280px;
      }
      .rotating-ring {
        width: 260px;
        height: 260px;
      }
      .orbit-icon {
        width: 48px;
        height: 48px;
        font-size: 1.5rem;
      }
      .center-symbol {
        width: 100px;
        height: 100px;
      }
      .center-symbol i {
        font-size: 2.7rem;
      }
      .orbit-icon:nth-child(1) { top: -2%; left: 38%; }
      .orbit-icon:nth-child(2) { top: 75%; left: -1%; }
      .orbit-icon:nth-child(3) { top: 12%; right: -2%; }
      .orbit-icon:nth-child(4) { bottom: -2%; left: 50%; }
      .orbit-icon:nth-child(5) { top: 48%; left: -12%; }
      .orbit-icon:nth-child(6) { bottom: 20%; right: -8%; }
      .title-card {
        padding: 0.8rem 1.6rem;
      }
      .btn-consult, .btn-whatsapp {
        padding: 0.7rem 1.5rem;
        font-size: 0.85rem;
      }
      .service-tags span {
        padding: 0.2rem 0.8rem;
        font-size: 0.7rem;
      }
    }

    /* Subtle extra glow */
    .extra-luxury {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.2), transparent);
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="hero-premium">
  <div class="grid-bg"></div>
  <div id="particle-canvas"></div>
  <div class="glow-backdrop"></div>
  <div class="extra-luxury"></div>

  <div class="content-center">
    <!-- ORBIT + SYMBOL FULLY ARRANGED (No name text) -->
    <div class="orbit-zone fade-item fade-1">
      <div class="rotating-ring"></div>
      <div class="icons-container">
        <!-- 6 Premium Tax Icons -->
        <div class="orbit-icon"><i class="fas fa-calculator"></i></div>
        <div class="orbit-icon"><i class="fas fa-file-invoice"></i></div>
        <div class="orbit-icon"><i class="fas fa-rupee-sign"></i></div>
        <div class="orbit-icon"><i class="fas fa-chart-pie"></i></div>
        <div class="orbit-icon"><i class="fas fa-shield-alt"></i></div>
        <div class="orbit-icon"><i class="fas fa-chart-line"></i></div>
      </div>
      
      <!-- CENTER AUDITOR + CONSULTANT ANIMATION SYMBOL (Replaces name box) -->
      <div class="center-symbol">
        <i class="fas fa-user-check"></i>
        <div class="rotating-sub-icons">
          <i class="fas fa-clipboard-list"></i>
          <i class="fas fa-stamp"></i>
        </div>
      </div>
    </div>

    <!-- TITLE SECTION :: Professional & Trust -->
    <div class="title-card fade-item fade-2">
      <h1 class="main-headline">TAX CONSULTANTS & AUDITORS</h1>
      <div class="service-tags">
        <span><i class="fas fa-file-invoice-dollar"></i> GST Practitioner</span>
        <span><i class="fas fa-chart-line"></i> Income Tax</span>
        <span><i class="fas fa-building"></i> Business Registration</span>
        <span><i class="fas fa-check-circle"></i> Audit & Compliance</span>
      </div>
    </div>

    <!-- CTA Buttons -->
    <div class="cta-group fade-item fade-3">
      <button class="btn-consult" id="consultTrigger"><i class="fas fa-calendar-alt"></i> Get Free Consultation</button>
      <button class="btn-whatsapp" id="whatsappTrigger"><i class="fab fa-whatsapp"></i> WhatsApp Now</button>
    </div>

    <!-- Trust Elements -->
    <div class="trust-footer fade-item fade-4">
      <span><i class="fas fa-map-marker-alt"></i> Coimbatore — Trusted Tax Experts</span>
      <span><i class="fas fa-trophy"></i> 22+ Years of Excellence</span>
      <span><i class="fas fa-users"></i> 5000+ Happy Clients</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- Particle system (smooth floating dots) ----------
    const canvas = document.getElementById('particle-canvas');
    if (!canvas) return;
    let ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function initParticles() {
      const particleCount = 95;
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 2.5 + 1,
          speedX: (Math.random() - 0.5) * 0.18,
          speedY: (Math.random() - 0.5) * 0.12,
          opacity: Math.random() * 0.5 + 0.2,
          color: `rgba(255, 225, 120, ${Math.random() * 0.5 + 0.15})`
        });
      }
    }

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      if (ctx) {
        ctx.clearRect(0, 0, width, height);
        particles = [];
        initParticles();
        drawParticles();
      }
    }

    function drawParticles() {
      if (!ctx) return;
      ctx.clearRect(0, 0, width, height);
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#FFD966';
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function updateParticles() {
      for (let p of particles) {
        p.x += p.speedX;
        p.y += p.speedY;
        if (p.x < -15) p.x = width + 15;
        if (p.x > width + 15) p.x = -15;
        if (p.y < -15) p.y = height + 15;
        if (p.y > height + 15) p.y = -15;
      }
      drawParticles();
      requestAnimationFrame(updateParticles);
    }

    window.addEventListener('resize', () => {
      resizeCanvas();
    });
    resizeCanvas();
    updateParticles();

    // ---------- CTA Interactive ----------
    const consultBtn = document.getElementById('consultTrigger');
    const whatsBtn = document.getElementById('whatsappTrigger');

    if (consultBtn) {
      consultBtn.addEventListener('click', () => {
        alert("📞 Book a Free Consultation with SR Associates — Coimbatore's leading Tax & GST Consultants. Call +91 422 456 7890 or visit our office.");
      });
    }

    if (whatsBtn) {
      whatsBtn.addEventListener('click', () => {
        const phoneNumber = '919876543210'; // Replace with actual firm's WhatsApp number
        const welcomeMsg = encodeURIComponent('Hello, I need expert advice on GST, Income Tax & Auditing in Coimbatore.');
        window.open(`https://wa.me/${phoneNumber}?text=${welcomeMsg}`, '_blank');
      });
    }
  })();
</script>
</body>
</html>
