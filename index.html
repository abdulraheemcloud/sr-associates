<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pure Blue Box | Hero Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0B132B, #030717);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ONLY BLUE BOX - No extra rings, no orbiting icons, no text, no name */
    .blue-box {
      width: 280px;
      height: 280px;
      background: rgba(10, 25, 55, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(0, 210, 255, 0.9);
      box-shadow: 0 0 50px rgba(0, 225, 255, 0.5), 0 25px 45px rgba(0, 0, 0, 0.4);
      animation: boxPulse 2.6s infinite ease-in-out;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Hero pulsing animation - smooth and dramatic */
    @keyframes boxPulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), 0 0 10px rgba(0, 210, 255, 0.6);
        border-color: rgba(0, 210, 255, 0.8);
      }
      50% {
        transform: scale(1.08);
        box-shadow: 0 0 70px rgba(0, 225, 255, 0.8), 0 0 30px rgba(0, 210, 255, 0.9);
        border-color: #FFD966;
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), 0 0 10px rgba(0, 210, 255, 0.6);
        border-color: rgba(0, 210, 255, 0.8);
      }
    }

    /* Center icon inside blue box - clean, animated but no text */
    .blue-box i {
      font-size: 5rem;
      background: linear-gradient(135deg, #FFE6B0, #FFC107, #3ECFEF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.7));
      animation: iconFloat 2s infinite ease-in-out;
      z-index: 2;
      transition: all 0.2s ease;
    }

    @keyframes iconFloat {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* Sparkle particles inside box - decorative, no text, enhances hero effect */
    .sparkles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      border-radius: 60px;
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #FFD966, #FFA500);
      border-radius: 50%;
      opacity: 0;
      animation: sparkleFloat 3s infinite ease-in-out;
    }

    .sparkle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 60%; left: 75%; animation-delay: 0.5s; width: 8px; height: 8px; }
    .sparkle:nth-child(3) { top: 80%; left: 30%; animation-delay: 1s; }
    .sparkle:nth-child(4) { top: 30%; left: 80%; animation-delay: 1.5s; width: 5px; height: 5px; }
    .sparkle:nth-child(5) { top: 45%; left: 45%; animation-delay: 2s; width: 7px; height: 7px; }
    .sparkle:nth-child(6) { top: 70%; left: 20%; animation-delay: 2.5s; }
    .sparkle:nth-child(7) { top: 15%; left: 55%; animation-delay: 0.8s; width: 4px; height: 4px; }
    .sparkle:nth-child(8) { top: 85%; left: 65%; animation-delay: 1.8s; }

    @keyframes sparkleFloat {
      0% {
        opacity: 0;
        transform: translateY(0px) scale(0.5);
      }
      50% {
        opacity: 1;
        transform: translateY(-12px) scale(1.2);
        box-shadow: 0 0 12px gold;
      }
      100% {
        opacity: 0;
        transform: translateY(-24px) scale(0.5);
      }
    }

    /* Glowing background effect behind box - subtle hero ambiance */
    .glow-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 200, 255, 0.15), transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
      pointer-events: none;
      animation: ambientGlow 4s infinite alternate;
    }

    @keyframes ambientGlow {
      0% { opacity: 0.3; transform: scale(0.9); }
      100% { opacity: 0.7; transform: scale(1.1); }
    }

    /* Responsive design - keeps only pure blue box experience */
    @media (max-width: 600px) {
      .blue-box {
        width: 220px;
        height: 220px;
        border-radius: 45px;
      }
      .blue-box i {
        font-size: 3.8rem;
      }
      .glow-bg {
        width: 300px;
        height: 300px;
      }
      .sparkles {
        border-radius: 45px;
      }
    }

    /* Hover effect - interactive but still pure blue box animation */
    .blue-box:hover {
      transform: scale(1.02);
      transition: transform 0.3s ease;
    }

    /* Additional fix: ensures no hidden text elements or pseudo-elements with content */
    .blue-box::before,
    .blue-box::after {
      content: none !important;
    }
    
    /* Remove any potential text or name from anywhere */
    body, div, i, span, p, h1, h2, h3, h4, h5, h6, a {
      user-select: none;
    }
    
    /* Ensure no "name" or label appears anywhere */
    [data-name], [name], .name, .title, .label {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  
  <!-- PURE BLUE BOX: Removed rotating rings, removed orbiting icons, removed any extra decorative elements that could be seen as 'not needed'.
       Only the hero box remains with pulsing animation, inner icon, and sparkles as requested. No name, no text label. -->
  <div class="blue-box">
    <!-- Sparkle particles inside - pure decorative, no text, no name -->
    <div class="sparkles">
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>
    
    <!-- Center icon: only visual, no accompanying text or label, no name -->
    <i class="fas fa-cube"></i>
  </div>
</body>
</html>
